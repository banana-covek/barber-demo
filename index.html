<!DOCTYPE html>
<html lang="sr-Latn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matko Barber Shop</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       NAVIGATION
  ═══════════════════════════════════════════ -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="#hero" class="nav-logo">MATKO<span>.</span></a>

      <ul class="nav-links">
        <li><a href="#about"    data-key="nav_about"></a></li>
        <li><a href="#services" data-key="nav_services"></a></li>
        <li><a href="#gallery"  data-key="nav_gallery"></a></li>
        <li><a href="#reviews"  data-key="nav_reviews"></a></li>
        <li><a href="#contact"  data-key="nav_contact"></a></li>
      </ul>

      <div class="nav-right">
        <!-- Language toggle -->
        <button id="lang-toggle" aria-label="Switch language">
          <span id="lang-label">ЋИР</span>
        </button>
        <!-- Mobile hamburger -->
        <button id="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu">
      <ul>
        <li><a href="#about"    data-key="nav_about"    class="mobile-link"></a></li>
        <li><a href="#services" data-key="nav_services" class="mobile-link"></a></li>
        <li><a href="#gallery"  data-key="nav_gallery"  class="mobile-link"></a></li>
        <li><a href="#reviews"  data-key="nav_reviews"  class="mobile-link"></a></li>
        <li><a href="#contact"  data-key="nav_contact"  class="mobile-link"></a></li>
      </ul>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════
       HERO
  ═══════════════════════════════════════════ -->
  <section id="hero">
    <div class="hero-bg-pattern"></div>

    <div class="hero-content">
      <!-- Placeholder logo -->
      <div class="logo-mark" aria-label="Matko Barber Shop logo">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <circle cx="60" cy="60" r="56" fill="none" stroke="#fff" stroke-width="2"/>
          <circle cx="60" cy="60" r="48" fill="none" stroke="#fff" stroke-width="0.5" stroke-dasharray="4 4"/>
          <!-- Scissors icon -->
          <g transform="translate(60,60)" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round">
            <circle cx="-14" cy="-8"  r="6"/>
            <circle cx="14"  cy="-8"  r="6"/>
            <line x1="-9"  y1="-5"  x2="18"  y2="18"/>
            <line x1="9"   y1="-5"  x2="-18" y2="18"/>
          </g>
          <text x="60" y="85" text-anchor="middle" font-size="7" fill="#fff" font-family="Barlow Condensed" letter-spacing="3">BARBER SHOP</text>
        </svg>
      </div>

      <p class="hero-tagline" data-key="hero_tagline"></p>
      <h1 class="hero-headline" data-key="hero_headline"></h1>
      <p class="hero-sub" data-key="hero_sub"></p>
      <a href="#contact" class="btn-primary" data-key="hero_cta"></a>
    </div>

    <!-- Decorative side text -->
    <div class="hero-side-text">BELGRADE · SERBIA · EST. 2020</div>

    <div class="hero-scroll-hint">
      <span data-key="scroll_hint"></span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       ABOUT
  ═══════════════════════════════════════════ -->
  <section id="about">
    <div class="container about-grid">
      <div class="about-visual">
        <div class="about-img-placeholder">
          <span>MATKO</span>
        </div>
        <div class="about-badge">
          <span class="badge-num">5+</span>
          <span class="badge-txt" data-key="about_badge"></span>
        </div>
      </div>

      <div class="about-text">
        <p class="section-label" data-key="label_about"></p>
        <h2 data-key="about_title"></h2>
        <p class="about-body" data-key="about_body"></p>
        <ul class="about-list">
          <li data-key="about_li1"></li>
          <li data-key="about_li2"></li>
          <li data-key="about_li3"></li>
        </ul>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       SERVICES
  ═══════════════════════════════════════════ -->
  <section id="services">
    <div class="container">
      <div class="section-header">
        <p class="section-label" data-key="label_services"></p>
        <h2 data-key="services_title"></h2>
      </div>

      <div class="services-grid">
        <!-- Cards injected by JS -->
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       GALLERY
  ═══════════════════════════════════════════ -->
  <section id="gallery">
    <div class="container">
      <div class="section-header">
        <p class="section-label" data-key="label_gallery"></p>
        <h2 data-key="gallery_title"></h2>
        <p class="section-sub" data-key="gallery_sub"></p>
      </div>

      <div class="gallery-grid" id="gallery-grid">
        <!-- Gallery images — edit GALLERY_IMAGES in script.js to add/remove -->
      </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" aria-hidden="true">
      <button id="lb-close" aria-label="Close">&#x2715;</button>
      <button id="lb-prev"  aria-label="Previous">&#8592;</button>
      <button id="lb-next"  aria-label="Next">&#8594;</button>
      <div id="lb-img-wrap">
        <img id="lb-img" src="" alt="Gallery image" />
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       REVIEWS
  ═══════════════════════════════════════════ -->
  <section id="reviews">
    <div class="container">
      <div class="section-header">
        <p class="section-label" data-key="label_reviews"></p>
        <h2 data-key="reviews_title"></h2>
        <div class="reviews-overall">
          <div class="overall-stars">★★★★★</div>
          <span class="overall-score">5.0</span>
          <span class="overall-count" data-key="reviews_count"></span>
          <img class="google-badge" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 74 24'%3E%3Ctext y='18' font-size='16' font-family='Arial' fill='%23aaa'%3EGoogle%3C/text%3E%3C/svg%3E" alt="Google" />
        </div>
      </div>

      <div class="reviews-track-wrap">
        <div class="reviews-track" id="reviews-track">
          <!-- Review cards injected by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       CONTACT
  ═══════════════════════════════════════════ -->
  <section id="contact">
    <div class="container contact-grid">

      <div class="contact-info">
        <p class="section-label" data-key="label_contact"></p>
        <h2 data-key="contact_title"></h2>
        <p class="contact-sub" data-key="contact_sub"></p>

        <ul class="contact-list">
          <li>
            <span class="contact-icon">&#9742;</span>
            <a href="tel:0644704034">064 470 40 34</a>
          </li>
          <li>
            <span class="contact-icon">&#9993;</span>
            <a href="mailto:matko@barber.rs">matko@barber.rs</a>
          </li>
          <li>
            <span class="contact-icon">&#9670;</span>
            <a href="https://www.instagram.com/matko.barber.shop/" target="_blank" rel="noopener">@matko.barber.shop</a>
          </li>
        </ul>

        <div class="working-hours">
          <p class="wh-title" data-key="hours_title"></p>
          <p data-key="hours_weekdays"></p>
          <p data-key="hours_saturday"></p>
          <p data-key="hours_sunday"></p>
        </div>
      </div>

      <div class="contact-form-wrap">
        <form id="contact-form" novalidate>
          <div class="form-group">
            <label for="f-name" data-key="form_name"></label>
            <input type="text" id="f-name" name="name" autocomplete="name" required />
          </div>
          <div class="form-group">
            <label for="f-phone" data-key="form_phone"></label>
            <input type="tel" id="f-phone" name="phone" autocomplete="tel" />
          </div>
          <div class="form-group">
            <label for="f-msg" data-key="form_message"></label>
            <textarea id="f-msg" name="message" rows="5" required></textarea>
          </div>
          <button type="submit" class="btn-primary" data-key="form_send"></button>
          <p id="form-note" class="form-note" data-key="form_note"></p>
        </form>
      </div>

    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer id="footer">
    <div class="footer-inner container">
      <span class="footer-logo">MATKO<span>.</span></span>
      <p class="footer-copy" data-key="footer_copy"></p>
      <a href="https://www.instagram.com/matko.barber.shop/" target="_blank" rel="noopener" class="footer-ig" aria-label="Instagram">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
